<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secutix Chatbot Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .header {
            background: #2d3748;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.8; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.bot {
            justify-content: flex-start;
        }
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        .user .message-bubble {
            background: #667eea;
            color: white;
            border-radius: 18px 4px 18px 18px;
        }
        .bot .message-bubble {
            background: white;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-radius: 4px 18px 18px 18px;
        }
        .sources {
            font-size: 12px;
            margin-top: 8px;
            padding: 8px;
            background: #edf2f7;
            border-radius: 6px;
        }
        .source-item {
            margin: 4px 0;
            font-weight: 500;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        .loading { opacity: 0.6; }
        .error { color: #c53030; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Secutix Documentation Chat</h1>
            <p>Ask anything about Secutix Release Notes (1,361 pages indexed)</p>
        </div>
        
        <div class="chat-messages" id="messages"></div>
        
        <div class="input-area">
            <input 
                type="text" 
                id="input" 
                placeholder="Ask about Secutix features, versions, releases..."
                onkeypress="if(event.key==='Enter') sendQuery()"
            >
            <button onclick="sendQuery()" id="send">Send</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8001';
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        function addMessage(text, isUser = false, sources = null) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            
            let html = `<div class="message-bubble">${escapeHtml(text)}`;
            if (sources && sources.length > 0) {
                html += `<div class="sources"><strong>📚 Sources:</strong>`;
                sources.forEach(s => {
                    html += `<div class="source-item">• ${escapeHtml(s.title)} (${(s.relevance*100).toFixed(0)}%)</div>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            
            msg.innerHTML = html;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function sendQuery() {
            const question = inputField.value.trim();
            if (!question) return;

            // Add user message
            addMessage(question, true);
            inputField.value = '';
            sendBtn.disabled = true;

            try {
                // Try /query first (needs credits), fall back to /search
                const response = await fetch(`${API_URL}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                if (response.status === 400 || response.status === 429) {
                    // Credits issue, fall back to search-only mode
                    console.log('Using search-only mode (no answer generation)...');
                    const searchResponse = await fetch(`${API_URL}/search?q=${encodeURIComponent(question)}`);
                    const data = await searchResponse.json();
                    
                    let answer = `📚 Found ${data.results.length} matching pages:\n\n`;
                    data.results.forEach((r, i) => {
                        answer += `${i+1}. **${r.title}** (${(r.relevance*100).toFixed(0)}% match)\n   ${r.text.substring(0, 100)}...\n`;
                    });
                    
                    addMessage(answer, false, data.results);
                } else if (response.ok) {
                    const data = await response.json();
                    addMessage(data.answer, false, data.sources);
                } else {
                    const error = await response.json();
                    addMessage(`❌ Error: ${error.detail}`, false);
                }
            } catch (e) {
                addMessage(`❌ Connection error: ${e.message}`, false);
            } finally {
                sendBtn.disabled = false;
                inputField.focus();
            }
        }

        // Welcome message
        addMessage('👋 Hi! I can search 1,361 pages of Secutix documentation. Ask me about versions, features, or release notes!', false);
    </script>
</body>
</html>
