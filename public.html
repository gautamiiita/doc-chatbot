<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secutix Documentation Assistant</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect fill='%23B40050' width='64' height='64' rx='8'/><text x='32' y='45' font-size='40' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'>S</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
            color: #B40050;
        }

        .header p {
            font-size: 16px;
            color: #666;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .chat-container {
            width: 100%;
        }

        /* Chat Widget Styling */
        .chat-header {
            background: #B40050;
            color: white;
            padding: 16px 20px;
        }

        .chat-header h3 {
            font-size: 18px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 12px;
            border-radius: 6px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .user .message-bubble {
            background: #B40050;
            color: white;
            border-radius: 6px 2px 6px 6px;
        }

        .bot .message-bubble {
            background: #f5f5f5;
            color: #333;
            border: none;
            border-radius: 2px 6px 6px 6px;
        }

        .bot .message-bubble.loading {
            background: #edf2f7;
            font-style: italic;
            opacity: 0.7;
        }

        .sources {
            font-size: 12px;
            margin-top: 8px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            border-left: 3px solid #B40050;
        }

        .source-item {
            margin: 4px 0;
            font-weight: 500;
            color: #333;
            font-size: 12px;
        }

        .source-item .relevance {
            color: #999;
            font-size: 11px;
        }

        .source-item a {
            color: #B40050;
            text-decoration: none;
        }

        .source-item a:hover {
            text-decoration: underline;
        }

        .chat-input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #B40050;
            box-shadow: 0 0 0 3px rgba(180, 0, 80, 0.1);
        }

        .chat-input-area button {
            padding: 10px 20px;
            background: #B40050;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 14px;
        }

        .chat-input-area button:hover:not(:disabled) {
            background: #8a003f;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(180, 0, 80, 0.3);
        }

        .chat-input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .api-status {
            padding: 15px;
            background: #fff5e6;
            border-left: 4px solid #ed8936;
            color: #7c2d12;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .api-status.success {
            background: #f0fdf4;
            border-left-color: #22c55e;
            color: #166534;
        }

        .footer {
            text-align: center;
            color: #999;
            padding: 15px;
            font-size: 12px;
        }

        .info-box {
            display: none;
        }

        .stats {
            display: none;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #718096;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>Secutix Documentation Search</h1>
            <p>Search across Secutix Release Notes and Documentation</p>
        </div>

        <div class="main">
            <div class="card chat-container">
                <div class="chat-header">
                    <h3>Documentation Search</h3>
                    <p id="api-info">Ready</p>
                </div>

                <div id="api-status" class="api-status" style="display: none;"></div>

                <div class="chat-messages" id="messages"></div>

                <div class="chat-input-area">
                    <input
                        type="text"
                        id="input"
                        placeholder="Ask about Secutix features, versions, releases..."
                        onkeypress="if(event.key==='Enter') sendQuery()"
                    >
                    <button onclick="sendQuery()" id="send">Send</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Powered by AI-powered semantic search</p>
        </div>
    </div>

    <script>
        // Use relative URL - works on both localhost and public ngrok
        const API_URL = window.location.origin;
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const apiInfo = document.getElementById('api-info');
        const statusDiv = document.getElementById('api-status');
        let useSearchFallback = false;
        
        // Detect browser language
        const browserLang = (navigator.language || navigator.userLanguage || 'en').split('-')[0];
        const supportedLangs = ['en', 'fr', 'es', 'de'];
        const userLanguage = supportedLangs.includes(browserLang) ? browserLang : 'en';
        
        const languageNames = {
            'en': '🇬🇧 English',
            'fr': '🇫🇷 Français',
            'es': '🇪🇸 Español',
            'de': '🇩🇪 Deutsch'
        };
        
        console.log(`Browser language detected: ${browserLang} → Using: ${userLanguage}`);

        // Check API health on load
        async function checkAPI() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    apiInfo.textContent = '✅ Backend connected';
                    statusDiv.style.display = 'none';
                    return true;
                }
            } catch (e) {
                apiInfo.textContent = '⚠️ Search only mode (answer generation unavailable)';
                statusDiv.style.display = 'block';
                statusDiv.textContent = '⚠️ API credits not available. Using search-only mode. Answers will show top matching pages.';
                useSearchFallback = true;
                return false;
            }
        }

        function addMessage(text, isUser = false, sources = null, isLoading = false) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;

            // Format text - convert markdown-style **bold** to actual bold
            let formattedText = text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            let html = `<div class="message-bubble${isLoading ? ' loading' : ''}">${formattedText}`;
            if (sources && sources.length > 0) {
                html += `<div class="sources"><strong>📚 Top Sources:</strong>`;
                sources.forEach((s, i) => {
                    // Handle both old and new response formats
                    let relevanceStr = '';
                    if (s.relevance_percentage) {
                        // New RAG format
                        relevanceStr = s.relevance_percentage;
                    } else if (s.relevance !== undefined) {
                        // Old search format (decimal 0-1)
                        relevanceStr = `${(s.relevance * 100).toFixed(0)}%`;
                    }
                    
                    const url = s.url ? `<a href="${s.url}" target="_blank" style="color: #667eea; text-decoration: none;">🔗 Open</a>` : '';
                    html += `<div class="source-item">${i + 1}. ${escapeHtml(s.title)} <span class="relevance">(${relevanceStr} match)</span> ${url}</div>`;
                });
                html += `</div>`;
            }
            html += `</div>`;

            msg.innerHTML = html;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function sendQuery() {
            const question = inputField.value.trim();
            if (!question) return;

            addMessage(question, true);
            inputField.value = '';
            sendBtn.disabled = true;

            // Show loading indicator
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message bot';
            loadingMsg.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            messagesDiv.appendChild(loadingMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                // SINGLE UNIFIED CALL: Search → LLM → Answer + Sources
                console.log(`[${userLanguage}] Calling /query (unified endpoint)...`);
                const response = await fetch(`${API_URL}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        question: question,
                        language: userLanguage 
                    })
                });

                loadingMsg.remove();

                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Query succeeded:', data);
                    
                    // Display LLM answer + sources
                    addMessage(data.answer, false, data.sources);
                } else {
                    const error = await response.text();
                    console.error(`❌ Query failed: ${response.status}`, error);
                    addMessage(`❌ Error: ${response.status} - ${error}`, false);
                }
            } catch (e) {
                loadingMsg.remove();
                console.error('❌ Exception:', e);
                addMessage(`❌ Error: ${e.message}. Backend may not be running.`, false);
            } finally {
                sendBtn.disabled = false;
                inputField.focus();
            }
        }

        // Initialize
        window.addEventListener('load', async () => {
            await checkAPI();
            let welcomeMsg = `How can I help you search for Secutix documentation?`;
            addMessage(welcomeMsg, false);
        });
    </script>
</body>
</html>
